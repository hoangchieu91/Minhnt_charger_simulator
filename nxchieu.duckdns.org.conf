server {
    listen 80;
    server_name nxchieu.duckdns.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name nxchieu.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/nxchieu.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nxchieu.duckdns.org/privkey.pem;

    location / {
        proxy_pass http://10.25.7.116:81/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /slave/ {
        proxy_pass http://10.25.7.111:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /master/ {
        proxy_pass http://10.25.7.142:80/;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding ""; 
        sub_filter '="/' '="/master/';
        sub_filter "='/" "='/master/";
        sub_filter "open('POST', '/" "open('POST', '/master/";
        sub_filter "open('GET', '/" "open('GET', '/master/";
        sub_filter "fetch('/" "fetch('/master/";
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/xml text/css text/javascript application/json text/plain;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

}
