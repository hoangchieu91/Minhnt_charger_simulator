# nxchieu.duckdns.org — Multi-service reverse proxy
# OTA: /ota/* (public, for ESP32)
# Download: /download (public, for technicians)
# Dashboard: /firmware/ (admin panel)
# App: / (default app)

server {
    listen 80;
    listen [::]:80;
    server_name nxchieu.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nxchieu.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/npm-12/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npm-12/privkey.pem;
    include /etc/nginx/snippets/ssl_params;
    include /etc/nginx/snippets/proxy_params_custom;

    # ═══ ESP32 OTA — PUBLIC (no auth) ═══
    location /ota/ {
        proxy_pass http://127.0.0.1:8099/ota/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 16M;
    }

    # ═══ Download Center — PUBLIC (no auth) ═══
    location /download {
        proxy_pass http://127.0.0.1:8099/download;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ═══ Health Check — PUBLIC ═══
    location /health {
        proxy_pass http://127.0.0.1:8099/health;
    }

    # ═══ Firmware Dashboard + API — Admin panel ═══
    location /firmware/ {
        proxy_pass http://127.0.0.1:8099/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 16M;
    }

    # ═══ Default App ═══
    location /api/v1/ {
        proxy_pass http://10.25.7.202:8000;
    }

    location / {
        proxy_pass http://10.25.7.202:3000;
    }

    # ═══ Simulator UI ═══
    location /slave/ {
        proxy_pass http://10.25.7.111:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ═══ Master ESP32 UI ═══
    location /master/ {
        proxy_pass http://10.25.7.142:80/;
        proxy_set_header Host $host;
        # Tắt encode để nginx có thể sub_filter HTML thô
        proxy_set_header Accept-Encoding ""; 
        
        # Rewrite các absolute path của webview tĩnh ESP
        sub_filter '="/' '="/master/';
        sub_filter "='/" "='/master/";
        sub_filter "open('POST', '/" "open('POST', '/master/";
        sub_filter "open('GET', '/" "open('GET', '/master/";
        sub_filter "fetch('/" "fetch('/master/";
        sub_filter_once off;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
